<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Deutsche Bank</title>
    <style>
        :root {
            /* Precise Deutsche Bank Corporate Visual Style Metrics */
            --db-blue-primary: #0018A8;
            --db-blue-hover: #001073;
            --db-gray-canvas: #f8fafc;
            --db-gray-panel: #ffffff;
            --db-gray-border: #e2e8f0;
            --db-text-dark: #0f172a;
            --db-text-muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--db-gray-canvas);
            color: var(--db-text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        nav {
            background-color: var(--db-gray-panel);
            border-bottom: 1px solid var(--db-gray-border);
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        /* Mathematically Correct High-Definition Deutsche Bank Logo Configuration */
        .db-logo-box {
            width: 42px;
            height: 42px;
            border: 4px solid var(--db-blue-primary);
            position: relative;
            background-color: transparent;
            flex-shrink: 0;
        }
        .db-logo-slash {
            position: absolute;
            width: 44px;
            height: 4px;
            background-color: var(--db-blue-primary);
            top: 19px;
            left: -5px;
            transform: rotate(-45deg);
            transform-origin: center;
        }
        .brand-meta {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }
        .brand-heading {
            font-size: 16px;
            font-weight: 700;
            color: var(--db-text-dark);
            letter-spacing: -0.3px;
        }
        .brand-tagline {
            font-size: 11px;
            color: var(--db-blue-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-top: 2px;
        }
        .app-workspace-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        aside {
            width: 260px;
            background-color: var(--db-gray-panel);
            border-right: 1px solid var(--db-gray-border);
            padding: 32px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        @media (max-width: 768px) { aside { display: none; } }
        .sidebar-action-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            color: var(--db-text-dark);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-radius: 4px;
            transition: background 0.1s ease;
        }
        .sidebar-action-btn:hover {
            background-color: #f1f5f9;
        }
        .sidebar-action-btn.active {
            background-color: #f1f5f9;
            font-weight: 600;
            color: var(--db-blue-primary);
        }
        main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background-color: var(--db-gray-canvas);
        }
        .corporate-btn {
            background-color: var(--db-blue-primary);
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 2px;
            cursor: pointer;
            transition: background-color 0.1s ease;
        }
        .corporate-btn:hover { background-color: var(--db-blue-hover); }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <!--<div class="db-logo-box"><div class="db-logo-slash"></div></div>-->
            <svg viewBox="0 0 100 100" style="width: 40px; height: 40px;" aria-label="Deutsche Bank Logo">
                    <!-- Square Border -->
                    <rect x="5" y="5" width="90" height="90" fill="none" stroke="#0018A8" stroke-width="9"/>
                    <!-- Internal Diagonal Slash -->
                    <line x1="22" y1="78" x2="78" y2="22" stroke="#0018A8" stroke-width="9" stroke-linecap="square"/>
                </svg>
            <div class="brand-meta">
                <span class="brand-heading">Deutsche Bank</span>
                <!--<span class="brand-tagline">Hotscan AI Agent</span>-->
            </div>
        </div>
        {% if user.is_authenticated %}
        <div style="display: flex; align-items: center; gap: 24px;">
            <strong style="font-size: 13px; color: var(--db-text-muted);">{{ user.username }}</strong></span>
            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="corporate-btn" style="background-color: transparent; color: var(--db-text-dark); border: 1px solid var(--db-gray-border); padding: 8px 16px;">Sign Out</button>
            </form>
        </div>
        {% endif %}
    </nav>
    <div class="app-workspace-layout">
        {% if user.is_authenticated %}
        <aside>
            <a href="{% url 'chatbot' %}" class="sidebar-action-btn active"><span>📊</span> <span>Ai Chat Assistant</span></a>
            <a href="{% url 'downloads' %}" class="sidebar-action-btn"><span>🔒</span> <span>Repository</span></a>
        </aside>
        {% endif %}
        <main>{% block content %}{% endblock %}</main>
    </div>
</body>
</html>
